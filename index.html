<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Finance Dashboard</title>
<link rel="stylesheet" href="style.css">
<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
</head>
<body>

<header>
  <h2>💰 Finance Dashboard</h2>
  <div class="header-controls">
    <select id="role">
      <option value="viewer">Viewer</option>
      <option value="admin">Admin</option>
    </select>
    <button id="darkModeBtn">🌙 Dark Mode</button>
    <button id="exportCsvBtn">CSV Export</button>
    <button id="exportJsonBtn">JSON Export</button>
  </div>
</header>

<div class="container">

  <!-- Cards -->
  <div class="cards">
    <div class="card"><h3>Balance</h3><p id="balance"></p></div>
    <div class="card"><h3>Income</h3><p id="income"></p></div>
    <div class="card"><h3>Expense</h3><p id="expense"></p></div>
  </div>

  <!-- Charts -->
  <div class="charts">
    <div class="chart-box"><canvas id="lineChart"></canvas></div>
    <div class="chart-box"><canvas id="pieChart"></canvas></div>
  </div>

  <!-- Controls -->
  <div class="controls">
    <input type="text" id="search" placeholder="Search category...">
    <select id="filterType">
      <option value="all">All</option>
      <option value="income">Income</option>
      <option value="expense">Expense</option>
    </select>
  </div>

  <div id="emptyState" class="empty">No transactions found</div>

  <div class="table-wrapper">
  <table>
    <thead>
      <tr>
        <th>Date</th>
        <th>Category</th>
        <th>Amount</th>
        <th>Type</th>
        <th>Actions</th>
      </tr>
    </thead>
    <tbody id="tableBody"></tbody>
  </table>
</div>

  <!-- Admin Panel -->
  <div id="adminPanel">
    <input type="date" id="date">
    <input type="text" id="category" placeholder="Category">
    <input type="number" id="amount" placeholder="Amount">
    <select id="type">
      <option value="income">Income</option>
      <option value="expense">Expense</option>
    </select>
    <button id="addBtn">Add</button>
  </div>

  <!-- Insights -->
  <div class="insights">
    <h3>📊 Insights</h3>
    <p id="insights"></p>
  </div>

</div>

<script src="script.js"></script>
</body>
</html>
